name: test

on:
  workflow_call:
  push:
    branches:
      - main
      - master
    paths:
      - "./**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "./**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip zip git

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check source and tests
        working-directory: .
        run: |
          deno check alteran.ts src/alteran/**/*.ts tests/*.ts tests/examples/*.ts tests/docs/*.ts tools/**/*.ts

      - name: Prepare Linux test report directory
        working-directory: .
        run: mkdir -p .ci/test-results

      - name: Run unit tests
        working-directory: .
        run: deno run -A ./alteran.ts test -A --junit-path=.ci/test-results/linux-unit.junit.xml ./tests/alteran_unit_test.ts

      - name: Run repository e2e tests
        working-directory: .
        run: deno run -A ./alteran.ts test -A --junit-path=.ci/test-results/linux-e2e.junit.xml ./tests/alteran_e2e_test.ts ./tests/alteran_unix_e2e_test.ts

      - name: Run docs and examples tests
        working-directory: .
        run: deno run -A ./alteran.ts test -A --junit-path=.ci/test-results/linux-examples.junit.xml ./tests/examples/*.ts ./tests/docs/*.ts

      - name: Run docker e2e tests
        working-directory: .
        run: deno run -A ./alteran.ts test -A --junit-path=.ci/test-results/linux-docker.junit.xml ./tests/alteran_docker_e2e_test.ts

      - name: Publish Linux test report
        if: success() || failure()
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: Linux Test Report
          files: .ci/test-results/linux-*.junit.xml

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Prepare Windows test report directory
        working-directory: .
        shell: cmd
        run: if not exist .ci\test-results mkdir .ci\test-results

      - name: Run windows e2e tests
        working-directory: .
        shell: cmd
        run: deno run -A ./alteran.ts test -A --junit-path=.ci/test-results/windows-e2e.junit.xml ./tests/alteran_windows_e2e_test.ts

      - name: Upload Windows test report artifact
        if: success() || failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: windows-test-results
          path: .ci/test-results/windows-*.junit.xml
          if-no-files-found: ignore
