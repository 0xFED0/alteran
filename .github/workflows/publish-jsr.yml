name: publish-jsr

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Refresh local runtime
        working-directory: .
        run: deno run -A ./alteran.ts refresh

      - name: Verify tag matches Alteran version
        working-directory: .
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_VERSION="$(deno eval \"import { ALTERAN_VERSION } from './src/alteran/version.ts'; console.log(ALTERAN_VERSION)\")"
          if [ "$TAG_VERSION" != "$SOURCE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match ALTERAN_VERSION $SOURCE_VERSION" >&2
            exit 1
          fi

      - name: Publish to JSR
        working-directory: .
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
        run: deno run -A ./alteran.ts tool run publish_jsr
